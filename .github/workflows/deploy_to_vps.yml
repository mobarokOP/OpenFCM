name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production (onefcm.com)
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            # Exit immediately if a command exits with a non-zero status
            set -e

            echo "Navigating to project directory..."
            cd /www/wwwroot/ONE_FCM

            echo "Configuring git safe directory to prevent ownership errors..."
            git config --global --add safe.directory /www/wwwroot/ONE_FCM

            echo "Pulling latest code from main branch..."
            if [ ! -d ".git" ]; then
              echo "Git repository not found. Initializing..."
              git init
              git branch -m main
            fi

            # Ensure remote origin exists and is correct
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/mobarokOP/OpenFCM.git

            # Fetch the latest and reset to avoid merge conflicts
            git fetch origin main
            git reset --hard origin/main

            # --- BACKEND (admin.onefcm.com -> backend/public) ---
            cd backend
            echo "Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader

            echo "Running database migrations..."
            php artisan migrate --force

            echo "Optimizing Laravel..."
            php artisan optimize:clear
            # Rebuild the config/route/view caches — without this every request
            # re-parses all config and routes, which is the main API slowdown.
            php artisan optimize

            # Tell any running queue workers to reload the new code.
            php artisan queue:restart || true
            cd ..

            # --- DASHBOARD (dashboard.onefcm.com -> dashboard/dist) ---
            echo "Building Frontend..."
            cd dashboard
            npm install
            echo "VITE_API_BASE=https://admin.onefcm.com/v1" > .env
            npm run build
            cd ..

            # --- LANDING (onefcm.com -> landing/) ---
            # Static site; nothing to build. Served straight from landing/.

            echo "Deployment completed successfully!"
