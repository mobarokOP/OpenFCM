name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            # Exit immediately if a command exits with a non-zero status
            set -e

            echo "Navigating to project directory..."
            cd /www/wwwroot/BETA_KATHGOLAP
            
            echo "Configuring git safe directory to prevent ownership errors..."
            git config --global --add safe.directory /www/wwwroot/BETA_KATHGOLAP
            
            echo "Pulling latest code from main branch..."
            if [ ! -d ".git" ]; then
              echo "Git repository not found. Initializing..."
              git init
              git branch -m main
            fi
            
            # Ensure remote origin exists and is correct
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/mobarokOP/OpenFCM.git
            
            # Fetch the latest and reset to avoid merge conflicts
            git fetch origin main
            git reset --hard origin/main
            
            # =================================================================
            # DEPLOYMENT SCRIPT
            # The section below uses Docker since a production docker-compose 
            # is provided. If you are NOT using Docker, uncomment the native 
            # section below and remove the Docker section.
            # =================================================================
            
            # --- DOCKER DEPLOYMENT (Commented Out) ---
            # echo "Rebuilding containers and restarting services..."
            # docker compose build
            # docker compose up -d --remove-orphans
            # 
            # echo "Running database migrations..."
            # docker compose exec -T app php artisan migrate --force
            # 
            # echo "Clearing and caching Laravel config..."
            # docker compose exec -T app php artisan optimize:clear
            
            # --- NATIVE aaPanel DEPLOYMENT (Active) ---
            cd backend
            echo "Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader
            
            echo "Running database migrations..."
            php artisan migrate --force
            
            echo "Optimizing Laravel..."
            php artisan optimize:clear
            cd ..
            
            echo "Building Frontend..."
            cd dashboard
            npm install
            echo "VITE_API_BASE=https://admin.beta.kathgolap.online/v1" > .env
            npm run build
            cd ..
            
            echo "Deployment completed successfully!"
