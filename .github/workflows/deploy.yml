# =============================================================================
# OpenPush — Build & publish Docker images (deploy skeleton)
# -----------------------------------------------------------------------------
# Triggers on version tags (v1.2.3) or published GitHub Releases. Builds the
# backend + dashboard images and pushes them to a container registry, then
# (optionally) rolls them out to a host over SSH.
#
# >>> TODO: configure these repository secrets before enabling deploy <<<
#   REGISTRY            e.g. ghcr.io  |  registry.digitalocean.com/openpush
#   REGISTRY_USERNAME   registry login user (for GHCR use ${{ github.actor }})
#   REGISTRY_PASSWORD   registry token / PAT with write:packages
#   DEPLOY_SSH_HOST     production host (IP or DNS)
#   DEPLOY_SSH_USER     ssh user with docker permissions
#   DEPLOY_SSH_KEY      private key for the above user
#   DEPLOY_PATH         remote path containing docker-compose.yml + .env
# =============================================================================
name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  release:
    types: [published]

# Least-privilege token; `packages: write` is needed only for GHCR.
permissions:
  contents: read
  packages: write

env:
  # TODO: point this at your registry namespace (org/repo path).
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAMESPACE: openpush

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: infra/docker/backend/Dockerfile
            target: production
          - name: dashboard
            dockerfile: infra/docker/dashboard/Dockerfile
            target: production

    steps:
      - uses: actions/checkout@v4

      # Derive a clean tag from the pushed git ref (v1.2.3 -> 1.2.3).
      - name: Resolve image tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: swap for docker/login-action against your chosen registry.
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:latest
          # Registry-backed layer cache speeds up subsequent builds.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # Roll out to the production host. Guarded behind a GitHub Environment so it
  # can require manual approval. This is a SKELETON — adapt to your infra.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production # add required reviewers in repo settings for gating
    steps:
      - name: Deploy over SSH
        # TODO: replace with your rollout mechanism. This pulls the new images
        # and runs migrations via the `app` entrypoint, then recreates services.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export IMAGE_TAG="${GITHUB_REF_NAME#v}"
            docker compose pull
            # `app` entrypoint runs migrations + cache warmup on startup.
            docker compose up -d --remove-orphans
            docker image prune -f
