# =============================================================================
# OpenPush — Redis 7 production configuration
# -----------------------------------------------------------------------------
# Redis backs three concerns in this app:
#   * Cache store (CACHE_STORE=redis)
#   * Queue backend (QUEUE_CONNECTION=redis, the `push` queue)
#   * FCM OAuth access-token cache (API_CONTRACT lifecycle step 3)
#
# The password is injected at runtime via `--requirepass` in docker-compose.yml
# so this file stays environment-agnostic and safe to commit.
# =============================================================================

# --- Network -----------------------------------------------------------------
# Bind to all interfaces inside the container's private network only; the
# service is never published to the host in production.
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- Memory ------------------------------------------------------------------
# Cap memory and evict least-recently-used *volatile* keys first. Queue data is
# written WITHOUT a TTL, so `allkeys-lru` could drop pending jobs — `volatile-lru`
# only evicts cache entries that carry an expiry, protecting the queue.
maxmemory 512mb
maxmemory-policy volatile-lru
maxmemory-samples 5

# --- Persistence -------------------------------------------------------------
# AOF gives durable queue semantics (jobs survive a restart). everysec balances
# durability and throughput. RDB snapshots are kept as a coarse backup.
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
aof-use-rdb-preamble yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
dir /data

# RDB snapshot points (seconds, changed-keys). Complements the AOF.
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
stop-writes-on-bgsave-error yes

# --- Clients / slow log ------------------------------------------------------
maxclients 10000
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Safety ------------------------------------------------------------------
# Neuter the most dangerous admin commands to limit blast radius if an app
# credential leaks. Rename/remove to taste.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_b9c2f1"
