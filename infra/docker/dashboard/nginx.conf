# =============================================================================
# Dashboard container nginx — serves the built Vite SPA as static files.
# The edge nginx (infra/nginx/default.conf) proxies non-API traffic here.
# Listens on 8080 so it can run as an unprivileged process if desired.
# =============================================================================
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets emitted by Vite (dist/assets/*.[hash].*).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Container-local healthcheck target.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
