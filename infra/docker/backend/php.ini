; =============================================================================
; OpenPush — production PHP / OPcache configuration
; Loaded as conf.d/zz-openpush.ini so it overrides the base image defaults.
; =============================================================================

; --- Core limits -------------------------------------------------------------
; The notifications endpoint accepts fan-out payloads; keep memory generous but
; bounded. Uploads (FCM service-account JSON) are small, so 20M is plenty and
; must stay <= nginx client_max_body_size.
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 24M
max_execution_time = 60
max_input_time = 60
expose_php = Off

; Match the app's UTC-everywhere contract (all timestamps ISO-8601 UTC).
date.timezone = UTC

; --- OPcache (production) ----------------------------------------------------
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; validate_timestamps=0 => never stat files at runtime (fastest). Safe because
; code is immutable in the baked image; the dev image sets this back to 1.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; --- Realpath cache (fewer syscalls on a read-only code tree) -----------------
realpath_cache_size = 4096K
realpath_cache_ttl = 600
