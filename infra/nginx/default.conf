# =============================================================================
# OpenPush — edge reverse proxy (nginx)
# -----------------------------------------------------------------------------
# Responsibilities:
#   * Route the REST API (/v1, /api) to Laravel php-fpm over FastCGI.
#   * Serve the React dashboard SPA (proxied from the dashboard container).
#   * Apply gzip, security headers, body-size limits and API rate limiting.
#
# TLS is intentionally NOT terminated here — in production this sits behind a
# load balancer / Cloudflare doing TLS (see infra/README.md production
# checklist). A ready-to-enable 443 server block is included at the bottom.
# =============================================================================

# --- Rate-limit zones (http context via conf.d include) ----------------------
# General API budget keyed by client IP. FCM sends are server-to-server, so a
# generous steady rate with burst tolerance protects php-fpm without hurting
# legitimate bursts. SDK device traffic is high-fan-in, hence a separate zone.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_sdk:10m     rate=50r/s;
# Tighter budget for auth endpoints to blunt credential-stuffing.
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_req_status 429;

# Upstreams.
upstream php_backend {
    server app:9000;
}
upstream dashboard_spa {
    server dashboard:8080;
}

# --- gzip --------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    application/xml
    text/css
    text/plain
    text/javascript
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # Laravel's public/ document root (shared read-only from the app image).
    root /var/www/html/public;
    index index.php;

    # Uploaded FCM service-account JSON is small; cap request bodies to keep
    # this <= PHP post_max_size and mitigate abusive payloads.
    client_max_body_size 20m;
    client_body_timeout 30s;
    send_timeout 30s;

    # ---- Security headers (applied to every response) -----------------------
    # HSTS assumes TLS is terminated upstream; safe to send. 2 years + preload.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Baseline CSP. The dashboard is a self-hosted SPA talking only to same-origin
    # /v1; tighten `connect-src`/`img-src` if you split domains or add a CDN.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Edge healthcheck (used by docker healthcheck + LB probes).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- API: auth endpoints (stricter rate limit) --------------------------
    location ~ ^/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ---- API: SDK device/event ingest (high fan-in zone) --------------------
    location ~ ^/v1/(devices|events|users|tags|topics)(/|$) {
        limit_req zone=api_sdk burst=100 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ---- API: everything else under /v1 and legacy /api ---------------------
    location ~ ^/(v1|api)(/|$) {
        limit_req zone=api_general burst=60 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ---- FastCGI to php-fpm -------------------------------------------------
    # Only the front controller is executed; direct .php access is blocked below.
    location = /index.php {
        include fastcgi_params;
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block execution of any other PHP file (defense in depth).
    location ~ \.php$ {
        return 404;
    }

    # Deny access to hidden/sensitive files that might leak into public/.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ---- Dashboard SPA (everything not matched above) -----------------------
    # Proxy to the dashboard container which does the try_files SPA fallback.
    location / {
        proxy_pass http://dashboard_spa;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

